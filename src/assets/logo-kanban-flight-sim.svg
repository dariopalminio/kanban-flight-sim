<svg width="90" height="90" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <rect width="90" height="90" rx="16" fill="#ffffff"/>

  <!-- Avión tipo papel apuntando a la derecha -->
  <g transform="translate(15,10)">
    <!-- Forma principal -->
    <polygon points="0,0 60,20 0,40 20,25" fill="#2563eb"/>
    
    <!-- Pliegue -->
    <polyline points="0,0 20,25 60,20" fill="none" stroke="#1e3a8a" stroke-width="2"/>
  </g>

  <!-- Kanban board -->
  <g transform="translate(12,50)">
    <!-- Columnas -->
    <rect x="0" y="0" width="18" height="26" rx="3" fill="#ef4444"/>
    <rect x="22" y="0" width="18" height="26" rx="3" fill="#f59e0b"/>
    <rect x="44" y="0" width="18" height="26" rx="3" fill="#3b82f6"/>

    <!-- Tarjetas -->
    <rect x="3" y="4" width="12" height="4" rx="1.5" fill="#ffffff"/>
    <rect x="25" y="4" width="12" height="4" rx="1.5" fill="#ffffff"/>
    <rect x="47" y="4" width="12" height="4" rx="1.5" fill="#ffffff"/>

    <!-- Flujo -->
    <path d="M9 12 C18 16, 28 16, 37 12" stroke="#1f2937" stroke-width="1.5" fill="none"/>
    <polygon points="37,12 34,10 34,14" fill="#1f2937"/>

    <path d="M31 18 L53 18" stroke="#1f2937" stroke-width="1.5"/>
    <polygon points="53,18 50,16 50,20" fill="#1f2937"/>
  </g>
</svg>